services:
  nginx-lb:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - red_docker_proyecto

  mariadb:
    image: mariadb:11
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: db_proyecto_final
      MYSQL_USER: django
      MYSQL_PASSWORD: django123
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - red_docker_proyecto
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - red_docker_proyecto

volumes:
  mariadb_data:

networks:
  red_docker_proyecto:
    external: true