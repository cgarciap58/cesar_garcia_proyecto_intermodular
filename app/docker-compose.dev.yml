services:
  django:
    volumes:
      - ./src:/app
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - ../app/.env.local
    networks:
      - red_docker_proyecto

  frontend:
    image: node:20-alpine
    working_dir: /frontend
    command: sh -c "npm install && npm run dev"
    profiles:
      - frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/frontend
      - ./src/static/frontend:/src/static/frontend
    networks:
      - red_docker_proyecto

  nginx:
    ports: !reset
      - []
    networks:
      - red_docker_proyecto

networks:
  red_docker_proyecto:
    external: true