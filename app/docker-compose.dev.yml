services:
  django:
    volumes:
      - ./src:/app
      - static_volume:/var/www/static
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - ../app/.env.local
    networks:
      - red_docker_proyecto

  nginx:
    ports: !reset 
      - []
    networks:
      - red_docker_proyecto

volumes:
  static_volume:


networks:
  red_docker_proyecto:
    external: true