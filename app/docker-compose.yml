services:
  django:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_volume:/var/www/static
      - media_volume:/app/media
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - red_docker_proyecto
    env_file:
      - ../app/.env.aws
  nginx:
    image: nginx:alpine
    depends_on:
      - django
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static
      - media_volume:/app/media
    restart: unless-stopped
    networks:
      - red_docker_proyecto

volumes:
  static_volume:
  media_volume:

networks:
  red_docker_proyecto:
    driver: bridge