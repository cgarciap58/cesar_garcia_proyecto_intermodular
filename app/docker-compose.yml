services:
  django:
    build:
      context: ./django
    command: gunicorn core.wsgi --bind 0.0.0.0:8000
    ports:
      - "8000:8000"

  react:
    build:
      context: ./react/getbetter
    volumes:
      - ./react_build:/react/build
    ports:
      - "5173:5173"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./react/getbetter/dist:/var/www/react
    depends_on:
      - django
      - react

volumes:
  react_build:
