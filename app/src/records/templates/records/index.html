<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlayBetterGG</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body>

  <div id="root"></div>
    <div class="container py-5">
    <section class="card shadow-sm">
      <div class="card-body">
        <h1 class="card-title">Bienvenido a PlayBetterGG</h1>
        <p class="card-text">Usa tu cuenta para acceder al visor de tickets.</p>
        <div class="d-flex flex-wrap gap-2">
          <a class="btn btn-primary" href="{% url 'report_issue_form' %}">Reporta un incidente</a>
          {% if user.is_authenticated %}
            <a class="btn btn-outline-primary" href="{% url 'tickets_dashboard' %}">Ir a tu gestor de tickets</a>
            <form method="post" action="{% url 'logout' %}">
              {% csrf_token %}
              <button class="btn btn-outline-danger" type="submit">Cerrar sesión</button>
            </form>
          {% else %}
            <a class="btn btn-success" href="{% url 'login' %}">Iniciar sesión</a>
          {% endif %}
        </div>
      </div>
    </section>
  </div>

  <script type="module">
    import RefreshRuntime from "http://localhost:5173/@react-refresh";
    RefreshRuntime.injectIntoGlobalHook(window);
    window.$RefreshReg$ = () => {};
    window.$RefreshSig$ = () => (type) => type;
    window.__vite_plugin_react_preamble_installed__ = true;
  </script>
  <script type="module" src="http://localhost:5173/@vite/client"></script>
  <script type="module" src="http://localhost:5173/src/main.jsx"></script>


  
</body>        
</html>
