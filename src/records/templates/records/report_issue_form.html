<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report an issue</title>
</head>
<body>
  <h1>Report an issue</h1>

  {% if success_message %}
    <p>{{ success_message }} Ticket #{{ ticket_id }}</p>
  {% endif %}

  <form method="post" action="/tickets/submit/">
    {% csrf_token %}
    <label for="issue">Issue details</label><br />
    <textarea id="issue" name="issue" required rows="6" cols="60"></textarea><br />
    <button type="submit">Submit ticket</button>
  </form>
</body>
</html>
