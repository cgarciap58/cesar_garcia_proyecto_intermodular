<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyecto Psico</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    .actions { display: flex; gap: 1rem; margin-top: 1rem; }
    .button { padding: .6rem 1rem; border: 1px solid #333; border-radius: .5rem; text-decoration: none; color: #111; }
  </style>
</head>
<body>
  <h1>Welcome to Proyecto Psico</h1>
  <p>Use your account to access the ticket dashboard.</p>

  <div class="actions">
    <a class="button" href="{% url 'report_issue_form' %}">Report an issue</a>
    {% if user.is_authenticated %}
      <a class="button" href="{% url 'tickets_dashboard' %}">Go to ticket dashboard</a>
      <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button class="button" type="submit">Logout</button>
      </form>
    {% else %}
      <a class="button" href="{% url 'login' %}">Login</a>
    {% endif %}
  </div>
</body>
</html>
